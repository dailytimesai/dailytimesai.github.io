---
layout: default
title: 每天更新
---

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .logo {
            display: flex;
            align-items: center;
        }
        .logo img {
            width: 40px;
            height: 40px;
            margin-right: 10px;
        }
        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: #333;
        }
        .posts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }
        .post {
            border: 1px solid #eaeaea;
            border-radius: 8px;
            overflow: hidden;
        }
        .post img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .post-content {
            padding: 15px;
        }
        .post-title {
            margin: 0 0 10px 0;
        }
        .post-date {
            color: #666;
            font-size: 0.9em;
        }
        .post-excerpt {
            font-size: 0.9em;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="/assets/images/placeholder.jpg" alt="Logo">
            <h1>每天更新</h1>
        </div>
        <nav>
            <a href="/blog">Blog</a>
            <a href="https://twitter.com/yourtwitterhandle">Twitter</a>
            <a href="https://github.com/yourgithubhandle">GitHub</a>
            <a href="/feed.xml">RSS</a>
        </nav>
    </header>

    <main class="posts">
        {% for post in site.posts limit:6 %}
        <article class="post">
            {% if post.image %}
            <img src="{{ post.image }}" alt="{{ post.title }}">
            {% endif %}
            <div class="post-content">
                <h2 class="post-title">{{ post.title }}</h2>
                <p class="post-date">{{ post.date | date: "%Y/%m/%d" }}</p>
                <p class="post-excerpt">{{ post.excerpt | strip_html | truncatewords: 30 }}</p>
            </div>
        </article>
        {% endfor %}
    </main>
</body>
</html>
