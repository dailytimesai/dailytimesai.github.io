<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每天更新</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }

        header {
            background-color: white;
            padding: 10px 0;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .nav-links a {
            margin-left: 20px;
            text-decoration: none;
            color: #333;
        }

        main {
            max-width: 1200px;
            margin: 20px auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 0 20px;
        }

        .article-card {
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .article-image {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .article-content {
            padding: 15px;
        }

        .article-title {
            margin: 0 0 10px 0;
            font-size: 18px;
        }

        .article-date {
            color: #888;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="logo">每天更新</div>
            <div class="nav-links">
                <a href="#">首页</a>
                <a href="#">油管</a>
                <a href="#">B站</a>
                <a href="#">视频</a>
                <a href="#">加入会员</a>
                <a href="#">社区交流</a>
                <a href="#">零度会员</a>
            </div>
        </nav>
    </header>
    <main>
        {% for post in site.posts limit:6 %}
        <article class="article-card">
            {% if post.image %}
            <img src="{{ post.image }}" alt="{{ post.title }}" class="article-image">
            {% else %}
            <img src="/assets/images/placeholder.jpg" alt="Placeholder" class="article-image">
            {% endif %}
            <div class="article-content">
                <h2 class="article-title">{{ post.title }}</h2>
                <p class="article-date">{{ post.date | date: "%Y年%m月%d日" }}</p>
            </div>
        </article>
        {% endfor %}
    </main>
</body>

</html>
